<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CrownStone Real Estate</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">🏠 CrownStone Real Estate</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="properties.html">Properties</a></li>
                <li id="nav-user-menu">
                    <span id="user-name"></span>
                    <button id="logout-btn" class="btn-logout">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding: 30px 0;">
        <h1>My Dashboard</h1>
        <div class="dashboard-container">
            <div class="dashboard-menu">
                <a href="#" class="menu-item active" data-tab="favorites">❤️ Favorites</a>
                <a href="#" class="menu-item" data-tab="recently-viewed">👁️ Recently Viewed</a>
                <a href="#" class="menu-item" data-tab="profile">👤 Profile</a>
            </div>
            <div class="dashboard-content">
                <!-- Favorites Tab -->
                <div id="favorites-tab" class="tab-content active">
                    <h2>My Favorites</h2>
                    <div id="favorites-list" class="properties-grid"></div>
                </div>

                <!-- Recently Viewed Tab -->
                <div id="recently-viewed-tab" class="tab-content">
                    <h2>Recently Viewed</h2>
                    <div id="recently-viewed-list" class="properties-grid"></div>
                </div>

                <!-- Profile Tab -->
                <div id="profile-tab" class="tab-content">
                    <h2>My Profile</h2>
                    <form id="profile-form">
                        <div class="form-group">
                            <label for="profile-name">Name:</label>
                            <input type="text" id="profile-name" required>
                        </div>
                        <div class="form-group">
                            <label for="profile-email">Email:</label>
                            <input type="email" id="profile-email" disabled>
                        </div>
                        <div class="form-group">
                            <label for="profile-phone">Phone:</label>
                            <input type="tel" id="profile-phone">
                        </div>
                        <div class="form-group">
                            <label for="profile-location">Location:</label>
                            <input type="text" id="profile-location">
                        </div>
                        <button type="submit" class="btn-primary">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 CrownStone Real Estate. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
